  <text class="tchip1" x="188" y="138.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ Python ]</text>
  <text class="tchip2" x="280" y="138.5" fill="#4ade80" font-size="14" dominant-baseline="middle">[ Postgres ]</text>
  <text class="tchip3" x="389" y="138.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ FastAPI ]</text>
  <text class="tchip4" x="489" y="138.5" fill="#4ade80" font-size="14" dominant-baseline="middle">[ React ]</text>
  <text class="tchip5" x="573" y="138.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ Docker ]</text>
