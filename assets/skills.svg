  <text class="tchip8" x="389" y="173.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ LLMs ]</text>
  <text class="tchip9" x="464" y="173.5" fill="#4ade80" font-size="14" dominant-baseline="middle">[ AWS ]</text>
  <text class="tchip10" x="531" y="173.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ GCP ]</text>
