  <rect width="100%" height="100%" fill="#0a0a0b" rx="14" ry="14"/>
  
  <rect x="0" y="0" width="800" height="28" fill="#0a0a0b" rx="14" ry="14"/>
  <rect x="0" y="14" width="800" height="14" fill="#0a0a0b"/>
  <line x1="0" y1="28" x2="800" y2="28" stroke="#5a5a64" stroke-width="0.5" stroke-opacity="0.4"/>
  <g opacity="0.55">
    <circle cx="22" cy="14" r="5.5" fill="#ff5f57"/>
    <circle cx="40" cy="14" r="5.5" fill="#febc2e"/>
    <circle cx="58" cy="14" r="5.5" fill="#28c840"/>
  </g>
  <text x="400" y="15" fill="#5a5a64" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" dominant-baseline="middle">~/skills</text>

  <!-- Command line -->
