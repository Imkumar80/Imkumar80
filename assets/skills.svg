<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <!-- Animated Border Gradient -->
    <linearGradient id="skillsBorderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6">
        <animate attributeName="stop-color" values="#3b82f6;#ec4899;#10b981;#3b82f6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#3b82f6;#ec4899;#8b5cf6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#10b981;#3b82f6;#ec4899" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <style>
    text {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      fill: #e6edf3;
    }
    .prompt {
      fill: #4ade80;
      font-weight: bold;
    }
    .command {
      fill: #f1f5f9;
    }
    .category {
      fill: #f43f5e;
      font-weight: bold;
    }
    .chip {
      fill: #8b949e;
    }
    .chip-accent1 { fill: #60a5fa; } /* Blue */
    .chip-accent2 { fill: #34d399; } /* Green */
    .chip-accent3 { fill: #fbbf24; } /* Amber */
    .chip-accent4 { fill: #a78bfa; } /* Purple */
    .chip-accent5 { fill: #22d3ee; } /* Cyan */
    
    .window-title {
      fill: #8b949e;
      font-size: 12px;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    
    @keyframes fadeSection1 { 0%, 10% { opacity: 0; } 15%, 92% { opacity: 1; } 96%, 100% { opacity: 0; } }
    @keyframes fadeSection2 { 0%, 20% { opacity: 0; } 25%, 92% { opacity: 1; } 96%, 100% { opacity: 0; } }
    @keyframes fadeSection3 { 0%, 30% { opacity: 0; } 35%, 92% { opacity: 1; } 96%, 100% { opacity: 0; } }
    @keyframes fadeSection4 { 0%, 40% { opacity: 0; } 45%, 92% { opacity: 1; } 96%, 100% { opacity: 0; } }
    @keyframes fadeSection5 { 0%, 50% { opacity: 0; } 55%, 92% { opacity: 1; } 96%, 100% { opacity: 0; } }
    
    .sec1 { opacity: 0; animation: fadeSection1 15s infinite; }
    .sec2 { opacity: 0; animation: fadeSection2 15s infinite; }
    .sec3 { opacity: 0; animation: fadeSection3 15s infinite; }
    .sec4 { opacity: 0; animation: fadeSection4 15s infinite; }
    .sec5 { opacity: 0; animation: fadeSection5 15s infinite; }
  </style>

  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
  </filter>

  <g filter="url(#shadow)">
    <!-- Terminal Background with Animated Glowing Border -->
    <rect width="800" height="340" fill="#0d1117" rx="12" ry="12" stroke="url(#skillsBorderGradient)" stroke-width="2.5"/>
    
    <!-- Header/Title Bar -->
    <path d="M 1.25,12 A 10.75,10.75 0 0,1 12,1.25 L 788,1.25 A 10.75,10.75 0 0,1 798.75,12 L 798.75,36 L 1.25,36 Z" fill="#161b22"/>
    <line x1="0" y1="36" x2="800" y2="36" stroke="url(#skillsBorderGradient)" stroke-width="1"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    
    <!-- Title -->
    <text x="400" y="19" class="window-title" text-anchor="middle">~/stack.sh</text>
    
    <!-- Body Content -->
    <g transform="translate(25, 70)">
      <text class="prompt">guest@profile:~$</text>
      <text x="145" class="command">stack --list</text>
    </g>
    
    <!-- Languages (Section 1) -->
    <g class="sec1" transform="translate(25, 100)">
      <text class="category">Languages:    </text>
      <text x="120" class="chip-accent1">[ C++ ]   [ Python ]   [ Java ]   [ JavaScript ]   [ TypeScript ]   [ Bash ]</text>
    </g>
    
    <!-- AI / ML (Section 2) -->
    <g class="sec2" transform="translate(25, 135)">
      <text class="category">AI / ML:      </text>
      <text x="120" class="chip-accent2">[ PyTorch ]   [ TensorFlow ]   [ Keras ]   [ scikit-learn ]   [ NumPy ]   [ Pandas ]   [ MLflow ]</text>
    </g>
    
    <!-- Cloud/DevOps (Section 3) -->
    <g class="sec3" transform="translate(25, 170)">
      <text class="category">Cloud/DevOps: </text>
      <text x="120" class="chip-accent3">[ AWS ]   [ GCP ]   [ Firebase ]   [ Render ]   [ Vercel ]   [ Heroku ]   [ GitHub Actions ]</text>
    </g>
    
    <!-- Backend/Data (Section 4) -->
    <g class="sec4" transform="translate(25, 205)">
      <text class="category">Backend/Data: </text>
      <text x="120" class="chip-accent4">[ Django ]   [ Streamlit ]   [ Airflow ]   [ PostgreSQL ]   [ MongoDB ]   [ Redis ]   [ Supabase ]</text>
    </g>
    
    <!-- Tools (Section 5) -->
    <g class="sec5" transform="translate(25, 240)">
      <text class="category">Tools/Other:  </text>
      <text x="120" class="chip-accent5">[ Git ]   [ GitHub ]   [ GitLab ]   [ Figma ]   [ Framer ]   [ Anaconda ]   [ CUDA ]</text>
      
      <!-- Trailing Prompt -->
      <text x="0" y="45" class="prompt">guest@profile:~$</text>
      <rect class="cursor" x="145" y="33" width="8" height="15" fill="#e6edf3"/>
    </g>
  </g>
</svg>