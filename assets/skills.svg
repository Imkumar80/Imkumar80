  <text class="tchip14" x="279" y="208.5" fill="#4ade80" font-size="14" dominant-baseline="middle">[ Agentic AI ]</text>
  <text class="tchip15" x="405" y="208.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ VectorDB ]</text>
  <text class="tchip16" x="514" y="208.5" fill="#4ade80" font-size="14" dominant-baseline="middle">[ RAG ]</text>
  <text class="tchip17" x="581" y="208.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ C++ ]</text>
  <text class="tchip18" x="648" y="208.5" fill="#4ade80" font-size="14" dominant-baseline="middle">[ JAVA ]</text>
  <text class="tchip19" x="62" y="243.5" fill="#e7e7ea" font-size="14" dominant-baseline="middle">[ Diffusion models ]</text>
  

  <!-- Trailing prompt + cursor -->
  <text x="40" y="297.5" fill="#4ade80" font-size="14" dominant-baseline="middle">$</text>
  <rect class="cursor" x="62" y="289" width="8" height="15" fill="#e7e7ea"/>
