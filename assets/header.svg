<svg xmlns="http://www.w3.org/2000/svg" width="800" height="330" viewBox="0 0 800 330">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <style>
    text {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      fill: #e6edf3;
    }
    .prompt {
      fill: #4ade80;
      font-weight: bold;
    }
    .command {
      fill: #f1f5f9;
    }
    .key {
      fill: #60a5fa;
    }
    .val {
      fill: #f8fafc;
    }
    .window-title {
      fill: #8b949e;
      font-size: 12px;
    }
    .name-gradient {
      fill: url(#blueGradient);
    }
    
    /* Blinking cursor animation */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    
    /* Character typing keyframes */
    @keyframes charFade {
      0%, 3.3% { opacity: 0; }
      4%, 90% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }
    .char {
      opacity: 0;
      animation: charFade 15s infinite;
    }
    
    /* Dynamic cursor movement keyframes for 24 characters at 25px font size (15px width per char) */
    @keyframes cursorMove {
      0%, 3.3% { transform: translateX(0px); }
      3.9% { transform: translateX(15px); }
      4.5% { transform: translateX(30px); }
      5.1% { transform: translateX(45px); }
      5.7% { transform: translateX(60px); }
      6.3% { transform: translateX(75px); }
      6.9% { transform: translateX(90px); }
      7.5% { transform: translateX(105px); }
      8.1% { transform: translateX(120px); }
      8.7% { transform: translateX(135px); }
      9.3% { transform: translateX(150px); }
      9.9% { transform: translateX(165px); }
      10.5% { transform: translateX(180px); }
      11.1% { transform: translateX(195px); }
      11.7% { transform: translateX(210px); }
      12.3% { transform: translateX(225px); }
      12.9% { transform: translateX(240px); }
      13.5% { transform: translateX(255px); }
      14.1% { transform: translateX(270px); }
      14.7% { transform: translateX(285px); }
      15.3% { transform: translateX(300px); }
      15.9% { transform: translateX(315px); }
      16.5% { transform: translateX(330px); }
      17.1% { transform: translateX(345px); }
      17.7%, 90% { transform: translateX(360px); }
      95%, 100% { transform: translateX(0px); }
    }
    .typing-cursor {
      animation: cursorMove 15s infinite, blink 1s step-end infinite;
    }
    
    /* Fade in for subsequent lines */
    @keyframes lineFade {
      0%, 25% { opacity: 0; }
      28%, 90% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }
    .fade-line {
      opacity: 0;
      animation: lineFade 15s infinite;
    }
    
    @keyframes cmd2Fade {
      0%, 21% { opacity: 0; }
      24%, 90% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }
    .fade-cmd2 {
      opacity: 0;
      animation: cmd2Fade 15s infinite;
    }
  </style>

  <!-- Drop Shadow Filter -->
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
  </filter>

  <g filter="url(#shadow)">
    <!-- Terminal Background -->
    <rect width="800" height="330" fill="#0d1117" rx="12" ry="12" stroke="#30363d" stroke-width="1.5"/>
    
    <!-- Header/Title Bar -->
    <path d="M 0,12 A 12,12 0 0,1 12,0 L 788,0 A 12,12 0 0,1 800,12 L 800,36 L 0,36 Z" fill="#161b22"/>
    <line x1="0" y1="36" x2="800" y2="36" stroke="#30363d" stroke-width="1.5"/>
    
    <!-- Window Controls (Mac style) -->
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    
    <!-- Title -->
    <text x="400" y="19" class="window-title" text-anchor="middle">guest@profile: ~</text>
    
    <!-- Terminal Body Content -->
    <!-- Line 1: First Prompt -->
    <g transform="translate(25, 70)">
      <text class="prompt">guest@profile:~$</text>
      <text x="145" class="command">./introduce</text>
    </g>
    
    <!-- Line 2: Typed Output (25px font size inline, fully gradient blue, no spaces between tags, normal weight) -->
    <g transform="translate(25, 105)">
      <text style="font-size: 25px; font-weight: normal;" class="name-gradient"><tspan class="char" style="animation-delay: 0.50s">H</tspan><tspan class="char" style="animation-delay: 0.62s">i</tspan><tspan class="char" style="animation-delay: 0.74s" xml:space="preserve"> </tspan><tspan class="char" style="animation-delay: 0.86s">&#x1F44B;</tspan><tspan class="char" style="animation-delay: 0.98s">,</tspan><tspan class="char" style="animation-delay: 1.10s" xml:space="preserve"> </tspan><tspan class="char" style="animation-delay: 1.22s">I</tspan><tspan class="char" style="animation-delay: 1.34s" xml:space="preserve"> </tspan><tspan class="char" style="animation-delay: 1.46s">a</tspan><tspan class="char" style="animation-delay: 1.58s">m</tspan><tspan class="char" style="animation-delay: 1.70s" xml:space="preserve"> </tspan><tspan class="char" style="animation-delay: 1.82s">K</tspan><tspan class="char" style="animation-delay: 1.94s">u</tspan><tspan class="char" style="animation-delay: 2.06s">m</tspan><tspan class="char" style="animation-delay: 2.18s">a</tspan><tspan class="char" style="animation-delay: 2.30s">r</tspan><tspan class="char" style="animation-delay: 2.42s" xml:space="preserve"> </tspan><tspan class="char" style="animation-delay: 2.54s">R</tspan><tspan class="char" style="animation-delay: 2.66s" xml:space="preserve"> </tspan><tspan class="char" style="animation-delay: 2.78s">S</tspan><tspan class="char" style="animation-delay: 2.90s">h</tspan><tspan class="char" style="animation-delay: 3.02s">e</tspan><tspan class="char" style="animation-delay: 3.14s">t</tspan><tspan class="char" style="animation-delay: 3.26s">!</tspan></text>
      <!-- Moving cursor during typing -->
      <rect class="typing-cursor" x="0" y="-20" width="10" height="25" fill="#e6edf3"/>
    </g>
    
    <!-- Line 3: Second Prompt (appears after typing finishes) -->
    <g class="fade-cmd2" transform="translate(25, 145)">
      <text class="prompt">guest@profile:~$</text>
      <text x="145" class="command">whoami --details</text>
    </g>
    
    <!-- Details Group (fades in after second prompt) -->
    <g class="fade-line" transform="translate(25, 175)">
      <!-- Details Table Output -->
      <text y="15"><tspan class="key">Name:</tspan><tspan x="100" class="name-gradient" style="font-weight: bold; font-size: 22px;">Kumar R Shet</tspan></text>
      <text y="42"><tspan class="key">Role:</tspan><tspan x="100" class="val">AI/ML Engineer | ML Researcher | Open Source Enthusiast</tspan></text>
      <text y="67"><tspan class="key">Focus:</tspan><tspan x="100" class="val">Scalable AI Systems | ML Inference Optimization | Production Deployments</tspan></text>
      <text y="92"><tspan class="key">Location:</tspan><tspan x="100" class="val">Bengaluru, India</tspan></text>
      
      <!-- Blinking cursor at the very end of terminal -->
      <rect class="cursor" x="0" y="110" width="8" height="15" fill="#e6edf3"/>
      <text x="15" y="122" class="prompt">guest@profile:~$</text>
    </g>
  </g>
</svg>