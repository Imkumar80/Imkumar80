<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    text {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      fill: #e6edf3;
    }
    .prompt {
      fill: #4ade80;
      font-weight: bold;
    }
    .command {
      fill: #f1f5f9;
    }
    .val {
      fill: #f8fafc;
    }
    .bullet {
      fill: #60a5fa;
      font-weight: bold;
    }
    .window-title {
      fill: #8b949e;
      font-size: 12px;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    
    @keyframes contentFade {
      0%, 15% { opacity: 0; }
      20%, 92% { opacity: 1; }
      96%, 100% { opacity: 0; }
    }
    .fade-content {
      opacity: 0;
      animation: contentFade 15s infinite;
    }
    
    @keyframes promptFade {
      0% { opacity: 1; }
      96%, 100% { opacity: 1; }
    }
  </style>

  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
  </filter>

  <g filter="url(#shadow)">
    <!-- Terminal Background -->
    <rect width="800" height="200" fill="#0d1117" rx="12" ry="12" stroke="#30363d" stroke-width="1.5"/>
    
    <!-- Header/Title Bar -->
    <path d="M 0,12 A 12,12 0 0,1 12,0 L 788,0 A 12,12 0 0,1 800,12 L 800,36 L 0,36 Z" fill="#161b22"/>
    <line x1="0" y1="36" x2="800" y2="36" stroke="#30363d" stroke-width="1.5"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    
    <!-- Title -->
    <text x="400" y="19" class="window-title" text-anchor="middle">~/highlights.log</text>
    
    <!-- Body Content -->
    <g transform="translate(25, 70)">
      <text class="prompt">guest@profile:~$</text>
      <text x="145" class="command">cat highlights.log</text>
    </g>
    
    <g class="fade-content" transform="translate(25, 95)">
      <text y="5"><tspan class="bullet">[01]</tspan><tspan x="50" class="val">AWS Student Builder Group On-Campus Leader</tspan></text>
      <text y="25"><tspan class="bullet">[02]</tspan><tspan x="50" class="val">Multiple Inter-College Technical Event Winner</tspan></text>
      <text y="45"><tspan class="bullet">[03]</tspan><tspan x="50" class="val">Open Source and AI Research Enthusiast</tspan></text>
      <text y="65"><tspan class="bullet">[04]</tspan><tspan x="50" class="val">Ex AI/ML Research Intern at IISc</tspan></text>
      
      <!-- Trailing prompt -->
      <text x="0" y="90" class="prompt">guest@profile:~$</text>
      <rect class="cursor" x="145" y="78" width="8" height="15" fill="#e6edf3"/>
    </g>
  </g>
</svg>