<svg xmlns="http://www.w3.org/2000/svg" width="800" height="230" viewBox="0 0 800 230">
  <style>
    text {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      fill: #e6edf3;
    }
    .prompt {
      fill: #4ade80;
      font-weight: bold;
    }
    .command {
      fill: #f1f5f9;
    }
    .key {
      fill: #60a5fa;
    }
    .val {
      fill: #f8fafc;
    }
    .accent {
      fill: #f43f5e;
    }
    .window-title {
      fill: #8b949e;
      font-size: 12px;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    
    @keyframes statsFade {
      0%, 15% { opacity: 0; }
      20%, 92% { opacity: 1; }
      96%, 100% { opacity: 0; }
    }
    .stats-sec {
      opacity: 0;
      animation: statsFade 15s infinite;
    }
  </style>

  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
  </filter>

  <g filter="url(#shadow)">
    <!-- Terminal Background -->
    <rect width="800" height="230" fill="#0d1117" rx="12" ry="12" stroke="#30363d" stroke-width="1.5"/>
    
    <!-- Header/Title Bar -->
    <path d="M 0,12 A 12,12 0 0,1 12,0 L 788,0 A 12,12 0 0,1 800,12 L 800,36 L 0,36 Z" fill="#161b22"/>
    <line x1="0" y1="36" x2="800" y2="36" stroke="#30363d" stroke-width="1.5"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    
    <!-- Title -->
    <text x="400" y="19" class="window-title" text-anchor="middle">~/stats.sh</text>
    
    <!-- Body Content -->
    <!-- Line 1: Command Prompt -->
    <g transform="translate(25, 70)">
      <text class="prompt">guest@profile:~$</text>
      <text x="145" class="command">gh stats --year 2026</text>
    </g>
    
    <!-- Live stats data (fades in) -->
    <g class="stats-sec" transform="translate(25, 95)">
      <text y="5"><tspan class="key">Contributions (YTD):</tspan><tspan x="180" class="val" font-weight="bold">79 (Public &amp; Private)</tspan></text>
      <text y="30"><tspan class="key">├─ Commits:</tspan><tspan x="180" class="val">23</tspan></text>
      <text y="50"><tspan class="key">├─ Pull Requests:</tspan><tspan x="180" class="val">0</tspan></text>
      <text y="70"><tspan class="key">├─ Issues:</tspan><tspan x="180" class="val">0</tspan></text>
      <text y="90"><tspan class="key">└─ Private Activity:</tspan><tspan x="180" class="val">51 contributions</tspan></text>
      
      <!-- Trailing prompt -->
      <text x="0" y="115" class="prompt">guest@profile:~$</text>
      <rect class="cursor" x="145" y="103" width="8" height="15" fill="#e6edf3"/>
    </g>
  </g>
</svg>
